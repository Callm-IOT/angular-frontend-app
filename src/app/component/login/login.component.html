<form method="post" action="/">
    <div class="Name">
        <label for="username">Nombre de usuario</label>
        <input type="text" input="user" name="user" required>
    </div>
    <div class="password">
        <label for="password">Contraseña</label>
        <input type="password" input="password" name="password" required>
    </div>
    <div class="links">
        <div class="check">
            <label for="rememberPassword">Remember me</label>
            <input type="checkbox" name="rememberPass" id="rememberPassword">
        </div>
        <div class="forgotPass">
            <a href="http://">Forgot password?</a>
        </div>
    </div>
    <button type="submit">Inicia Sesión</button>
</form>
